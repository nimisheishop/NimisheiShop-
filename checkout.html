<body>

<h2>Checkout</h2>

<div id="orderItems" class="box"></div>

<div class="box">

  <div class="box">
  <h3>Payment Method</h3>

  <label>
    <input type="radio" name="payment" value="bkash"> bKash
  </label><br>

  </label>

  <input type="text" id="number" placeholder="Enter your mobile number">
</div>

  <input type="text" id="address" placeholder="Address">
  <input type="text" id="phone" placeholder="Phone Number">
</div>

<h3 id="total"></h3>

<button onclick="placeOrder()">orders.push({

  name: name,
  address: address,
  phone: phone,

  number: number,
  status: "Pending"
});</button>

<script>
let user = localStorage.getItem("currentUser");

if(!user){
  alert("Login first!");
  window.location.href = "login.html";
}

let cartKey = "cart_" + user;
let cart = JSON.parse(localStorage.getItem(cartKey)) || [];

let container = document.getElementById("orderItems");
let total = 0;

cart.forEach(item=>{
  container.innerHTML += `<p>${item.name} - ৳${item.price}</p>`;
  total += item.price;
});

document.getElementById("total").innerText = "Total: ৳" + total;

function placeOrder(){
  let name = document.getElementById("name").value;
  let address = document.getElementById("address").value;
  let phone = document.getElementById("phone").value;
  let number = document.getElementById("number").value;

  let payment = document.querySelector('input[name=\"payment\"]:checked');

  if(name==\"\" || address==\"\" || phone==\"\" || !payment || number==\"\"){
    alert(\"Fill all fields & select payment!\");
    return;
  }

  let method = payment.value;

  let orders = JSON.parse(localStorage.getItem(\"orders_\"+user)) || [];

  orders.push({
    items: cart,
    total: total,
    name: name,
    address: address,
    phone: phone,
    payment: method,
    number: number
  });

  localStorage.setItem(\"orders_\"+user, JSON.stringify(orders));

  localStorage.removeItem(cartKey);

  alert(\"Payment Successful via \" + method + \"!\");
  window.location.href = \"orders.html\";
